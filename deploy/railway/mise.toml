[tasks."deploy:control-plane"]
description = "Deploy the control-plane service to Railway"
dir = "../.."
run = "railway up --service control-plane --detach -m 'deploy control-plane'"

[tasks."deploy:web"]
description = "Deploy the web service to Railway"
dir = "../.."
run = "railway up --service web --detach -m 'deploy web'"

[tasks."deploy:www"]
description = "Deploy the root-domain marketing site to Railway"
dir = "../.."
run = "railway up --service www --detach -m 'deploy www'"

[tasks.deploy]
description = "Deploy control-plane, web, and www services to Railway"
depends = ["deploy:control-plane", "deploy:web", "deploy:www"]
