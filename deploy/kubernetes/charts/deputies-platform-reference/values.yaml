traefik:
  enabled: true
  fullnameOverride: traefik
  deployment:
    replicas: 1
  providers:
    kubernetesGateway:
      enabled: false
  gateway:
    enabled: true
    listeners:
      web:
        namespacePolicy:
          from: All
  gatewayClass:
    enabled: true
  ingressClass:
    enabled: true
    isDefaultClass: false
  service:
    type: LoadBalancer

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 17-alpine
    pullPolicy: IfNotPresent
  credentials:
    create: true
    secretName: deputies-postgres-app
    username: deputies
    password: deputies
    database: deputies
  testDatabase: deputies_test
  service:
    name: postgres-rw
    port: 5432
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: ''
  resources: {}
  labels: {}
  annotations: {}
  podLabels: {}
  podAnnotations: {}

seaweedfs:
  enabled: true
  image:
    repository: chrislusf/seaweedfs
    tag: '3.97'
    pullPolicy: IfNotPresent
  s3:
    accessKeyId: seaweed
    secretAccessKey: seaweed
    port: 8333
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: ''
  resources: {}
  labels: {}
  annotations: {}
  podLabels: {}
  podAnnotations: {}

agentSandbox:
  enabled: false
  # Installed from upstream release manifests because agent-sandbox does not
  # currently publish a Helm repository or packaged chart release.
  version: v0.4.6
  namespace: agent-sandbox-system
  kubectlImage: registry.k8s.io/kubectl:v1.33.0
  resources: {}
  labels: {}
  annotations: {}
  podLabels: {}
  podAnnotations: {}
