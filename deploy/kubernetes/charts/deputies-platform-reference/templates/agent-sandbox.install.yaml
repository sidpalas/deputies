{{- if .Values.agentSandbox.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "deputies-platform-reference.agentSandboxInstallerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deputies-platform-reference.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "deputies-platform-reference.agentSandboxInstallerName" . }}
  labels:
    {{- include "deputies-platform-reference.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "deputies-platform-reference.agentSandboxInstallerName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "deputies-platform-reference.agentSandboxInstallerName" . }}
  labels:
    {{- include "deputies-platform-reference.labels" . | nindent 4 }}
    {{- with .Values.agentSandbox.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- with .Values.agentSandbox.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "deputies-platform-reference.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-sandbox-installer
        {{- with .Values.agentSandbox.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.agentSandbox.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "deputies-platform-reference.agentSandboxInstallerName" . }}
      containers:
        - name: kubectl
          image: {{ .Values.agentSandbox.kubectlImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
          args:
            - apply
            - -f
            - https://github.com/kubernetes-sigs/agent-sandbox/releases/download/{{ .Values.agentSandbox.version }}/manifest.yaml
          resources:
            {{- toYaml .Values.agentSandbox.resources | nindent 12 }}
{{- end }}
