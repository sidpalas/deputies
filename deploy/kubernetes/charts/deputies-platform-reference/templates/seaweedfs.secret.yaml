{{- if .Values.seaweedfs.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deputies-platform-reference.seaweedfsName" . }}
  labels:
    {{- include "deputies-platform-reference.labels" . | nindent 4 }}
    {{- with .Values.seaweedfs.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.seaweedfs.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  access-key-id: {{ .Values.seaweedfs.s3.accessKeyId | quote }}
  secret-access-key: {{ .Values.seaweedfs.s3.secretAccessKey | quote }}
{{- end }}
