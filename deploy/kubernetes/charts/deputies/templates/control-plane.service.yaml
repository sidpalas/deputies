apiVersion: v1
kind: Service
metadata:
  name: {{ include "deputies.fullname" . }}-control-plane
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
    {{- with .Values.controlPlane.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.controlPlane.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.port }}
      targetPort: http
  selector:
    {{- include "deputies.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
