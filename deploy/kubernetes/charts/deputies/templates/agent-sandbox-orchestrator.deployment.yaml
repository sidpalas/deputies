{{- if .Values.controlPlane.agentSandboxOrchestrator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deputies.agentSandboxOrchestratorServiceName" . }}
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
    {{- with .Values.controlPlane.agentSandboxOrchestrator.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    app.kubernetes.io/component: agent-sandbox-orchestrator
  {{- with .Values.controlPlane.agentSandboxOrchestrator.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.controlPlane.agentSandboxOrchestrator.replicaCount }}
  selector:
    matchLabels:
      {{- include "deputies.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-sandbox-orchestrator
  template:
    metadata:
      annotations:
        checksum/app-secret: {{ include (print $.Template.BasePath "/app.secret.yaml") . | sha256sum }}
        rollout/revision: {{ .Values.rollout.revision | quote }}
        {{- with .Values.controlPlane.agentSandboxOrchestrator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with .Values.controlPlane.agentSandboxOrchestrator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "deputies.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-sandbox-orchestrator
    spec:
      serviceAccountName: {{ include "deputies.agentSandboxOrchestratorServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent-sandbox-orchestrator
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          command: ["node", "apps/control-plane/dist/sandbox/k8s-agent-sandbox-orchestrator-server.js"]
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.agentSandboxOrchestrator.port }}
          env:
            - name: AGENT_SANDBOX_ORCHESTRATOR_PORT
              value: {{ .Values.controlPlane.agentSandboxOrchestrator.port | quote }}
            - name: SANDBOX_WORKSPACE_PATH
              value: {{ .Values.config.sandboxWorkspacePath | quote }}
            - name: AGENT_SANDBOX_IMAGE
              value: {{ .Values.config.agentSandboxImage | quote }}
            - name: AGENT_SANDBOX_STORAGE_SIZE
              value: {{ .Values.config.agentSandboxStorageSize | quote }}
            {{- if .Values.config.agentSandboxNamespace }}
            - name: AGENT_SANDBOX_NAMESPACE
              value: {{ .Values.config.agentSandboxNamespace | quote }}
            {{- end }}
            {{- if .Values.config.agentSandboxStorageClassName }}
            - name: AGENT_SANDBOX_STORAGE_CLASS_NAME
              value: {{ .Values.config.agentSandboxStorageClassName | quote }}
            {{- end }}
            - name: AGENT_SANDBOX_ORCHESTRATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "deputies.secretName" . }}
                  key: AGENT_SANDBOX_ORCHESTRATOR_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.controlPlane.agentSandboxOrchestrator.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
