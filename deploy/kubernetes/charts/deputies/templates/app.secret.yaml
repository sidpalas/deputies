{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deputies.secretName" . }}
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SESSION_SECRET: {{ .Values.secrets.authSessionSecret | quote }}
  AUTH_STATIC_USERNAME: {{ .Values.secrets.authStaticUsername | quote }}
  AUTH_STATIC_PASSWORD: {{ .Values.secrets.authStaticPassword | quote }}
  API_BEARER_TOKEN: {{ .Values.secrets.apiBearerToken | quote }}
  DAYTONA_API_KEY: {{ .Values.secrets.daytonaApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  FLUE_OPENAI_CODEX_AUTH_BASE64: {{ .Values.secrets.flueOpenaiCodexAuthBase64 | quote }}
  FLUE_OPENAI_CODEX_AUTH_JSON: {{ .Values.secrets.flueOpenaiCodexAuthJson | quote }}
  ARTIFACT_STORAGE_S3_ACCESS_KEY_ID: {{ .Values.secrets.artifactStorageS3AccessKeyId | quote }}
  ARTIFACT_STORAGE_S3_SECRET_ACCESS_KEY: {{ .Values.secrets.artifactStorageS3SecretAccessKey | quote }}
  GITHUB_OAUTH_CLIENT_ID: {{ .Values.secrets.githubOAuthClientId | quote }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .Values.secrets.githubOAuthClientSecret | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  GITHUB_APP_ID: {{ .Values.secrets.githubAppId | quote }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.secrets.githubAppPrivateKey | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.secrets.slackSigningSecret | quote }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
{{- end }}
