apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deputies.fullname" . }}-web
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
    {{- with .Values.web.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.web.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "deputies.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "deputies.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.web.trustForwardedServiceHosts }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "deputies.fullname" . }}-web-caddyfile
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
          env:
            - name: PORT
              value: {{ .Values.web.service.port | quote }}
            - name: API_UPSTREAM
              value: {{ printf "http://%s-control-plane:%v" (include "deputies.fullname" .) .Values.controlPlane.service.port | quote }}
          {{- if .Values.web.trustForwardedServiceHosts }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
