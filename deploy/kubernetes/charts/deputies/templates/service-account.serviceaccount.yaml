{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "deputies.serviceAccountName" . }}
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if and .Values.controlPlane.agentSandboxOrchestrator.enabled .Values.controlPlane.agentSandboxOrchestrator.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "deputies.agentSandboxOrchestratorServiceAccountName" . }}
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox-orchestrator
  {{- with .Values.controlPlane.agentSandboxOrchestrator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
