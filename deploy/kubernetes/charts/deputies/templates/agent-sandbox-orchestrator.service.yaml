{{- if .Values.controlPlane.agentSandboxOrchestrator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "deputies.agentSandboxOrchestratorServiceName" . }}
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox-orchestrator
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.controlPlane.agentSandboxOrchestrator.port }}
      targetPort: http
  selector:
    {{- include "deputies.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox-orchestrator
{{- end }}
