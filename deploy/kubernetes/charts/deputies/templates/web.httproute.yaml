{{- if eq .Values.routing.mode "gateway" }}
{{- $fullname := include "deputies.fullname" . -}}
{{- $parentName := required "gateway.parentRef.name is required when routing.mode=gateway" .Values.gateway.parentRef.name -}}
{{- $webHost := .Values.gateway.web.host -}}
{{- $webPath := default .Values.ingress.web.path .Values.gateway.web.path -}}
{{- $servicesHost := .Values.gateway.services.host -}}
{{- $servicesPath := default .Values.ingress.services.path .Values.gateway.services.path -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $parentName }}
      {{- with .Values.gateway.parentRef.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      {{- with .Values.gateway.parentRef.sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
  {{- if $webHost }}
  hostnames:
    - {{ $webHost | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $webPath | quote }}
      backendRefs:
        - name: {{ $fullname }}-web
          port: {{ .Values.web.service.port }}
{{- if and .Values.gateway.services.enabled (ne $webHost $servicesHost) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-services
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $parentName }}
      {{- with .Values.gateway.parentRef.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      {{- with .Values.gateway.parentRef.sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
  {{- if $servicesHost }}
  hostnames:
    - {{ $servicesHost | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $servicesPath | quote }}
      backendRefs:
        - name: {{ $fullname }}-web
          port: {{ .Values.web.service.port }}
{{- end }}
{{- end }}
