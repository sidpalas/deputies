{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "deputies.fullname" . }}-migrate
  labels:
    {{- include "deputies.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
    {{- with .Values.migrations.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.migrations.hook }}
  annotations:
    helm.sh/hook: {{ .Values.migrations.hookEvents | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- else }}
  {{- with .Values.migrations.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- with .Values.migrations.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "deputies.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
      {{- with .Values.migrations.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      {{- if .Values.migrations.serviceAccountName }}
      serviceAccountName: {{ .Values.migrations.serviceAccountName }}
      {{- else if not (and .Values.migrations.hook .Release.IsInstall .Values.serviceAccount.create) }}
      serviceAccountName: {{ include "deputies.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          command: ["node", "apps/control-plane/dist/db/migrate.js"]
          env:
            {{- include "deputies.migrationEnv" . | trim | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
