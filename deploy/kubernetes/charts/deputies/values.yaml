controlPlane:
  image:
    repository: ghcr.io/sidpalas/deputies-control-plane
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3583
    labels: {}
    annotations: {}
  all:
    replicaCount: 1
    resources: {}
    labels: {}
    annotations: {}
    podAnnotations: {}
    podLabels: {}
  api:
    replicaCount: 1
    resources: {}
    labels: {}
    annotations: {}
    podAnnotations: {}
    podLabels: {}
  worker:
    replicaCount: 1
    resources: {}
    labels: {}
    annotations: {}
    podAnnotations: {}
    podLabels: {}
  agentSandboxOrchestrator:
    enabled: false
    replicaCount: 1
    port: 3587
    serviceAccount:
      create: true
      annotations: {}
      name: ''
    resources: {}
    labels: {}
    annotations: {}
    podAnnotations: {}
    podLabels: {}

web:
  replicaCount: 1
  image:
    repository: ghcr.io/sidpalas/deputies-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 5173
  resources: {}
  labels: {}
  annotations: {}
  podAnnotations: {}
  podLabels: {}
  trustForwardedServiceHosts: false

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

postgres:
  host: postgres-rw
  port: 5432
  database: flue
  username: flue
  password: flue
  sslMode: ''
  existingSecret: deputies-postgres-app
  secretKeys:
    username: username
    password: password
    database: database
    host: host
    port: port

config:
  runner: flue
  sandboxProvider: daytona
  sandboxWorkspacePath: /workspace
  apiAuthMode: none
  authProvider: static
  authCookieSecure: 'true'
  authCookieSameSite: lax
  webBaseUrl: https://deputies-k8s.localhost
  serviceBaseDomain: deputies-k8s.localhost
  serviceTrustForwardedHosts: 'true'
  appDataStore: postgres
  flueStateStore: postgres
  flueModel: anthropic/claude-haiku-4-5
  artifactStorageProvider: s3
  artifactStorageS3Endpoint: http://seaweedfs:8333
  artifactStorageS3Region: us-east-1
  artifactStorageS3Bucket: deputies-artifacts
  artifactStorageS3ForcePathStyle: 'true'
  artifactStorageS3CreateBucket: 'true'
  daytonaImage: ghcr.io/sidpalas/deputies-daytona-sandbox:latest
  daytonaApiUrl: ''
  daytonaTarget: ''
  daytonaSnapshot: ''
  agentSandboxOrchestratorMode: in-process
  agentSandboxOrchestratorUrl: ''
  agentSandboxNamespace: ''
  agentSandboxImage: ghcr.io/sidpalas/deputies-docker-sandbox:sha-ac8a459
  agentSandboxStorageSize: 1Gi
  agentSandboxStorageClassName: ''
  hideSetupPage: 'false'
  extraEnv: {}

secrets:
  create: true
  name: ''
  authSessionSecret: replace-with-random-session-secret
  authStaticUsername: dev
  authStaticPassword: dev-secret
  apiBearerToken: ''
  sandboxSecretEncryptionKey: replace-with-random-sandbox-secret
  agentSandboxOrchestratorToken: ''
  daytonaApiKey: ''
  anthropicApiKey: ''
  openaiApiKey: ''
  flueOpenaiCodexAuthBase64: ''
  flueOpenaiCodexAuthJson: ''
  artifactStorageS3AccessKeyId: seaweed
  artifactStorageS3SecretAccessKey: seaweed
  githubOAuthClientId: ''
  githubOAuthClientSecret: ''
  githubWebhookSecret: ''
  githubAppId: ''
  githubAppPrivateKey: ''
  slackSigningSecret: ''
  slackBotToken: ''

migrations:
  enabled: true
  hook: true
  hookEvents: post-install,post-upgrade
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  resources: {}
  labels: {}
  annotations: {}
  podLabels: {}
  podAnnotations: {}

topology:
  mode: combined

rollout:
  revision: ''

routing:
  mode: ingress

ingress:
  className: traefik
  annotations: {}
  web:
    host: deputies-k8s.localhost
    path: /
    pathType: Prefix
  services:
    enabled: true
    host: '*.deputies-k8s.localhost'
    path: /
    pathType: Prefix

gateway:
  annotations: {}
  parentRef:
    name: traefik-gateway
    namespace: ''
    sectionName: web
  web:
    host: deputies-k8s.localhost
    path: ''
  services:
    enabled: true
    host: '*.deputies-k8s.localhost'
    path: ''

serviceAccount:
  create: true
  annotations: {}
  name: ''

rbac:
  create: true

podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
