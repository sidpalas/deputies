name: Build and Push Images

on:
  # Keep automatic publishing disabled until image release cadence is settled.
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      web:
        description: Build and push web
        type: boolean
        default: true
      control_plane:
        description: Build and push control-plane
        type: boolean
        default: true
      daytona:
        description: Build and push Daytona
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate image selection
    runs-on: ubuntu-latest
    steps:
      - name: Require at least one image
        run: |
          if [ "${{ inputs.web }}" != "true" ] && [ "${{ inputs.control_plane }}" != "true" ] && [ "${{ inputs.daytona }}" != "true" ]; then
            echo "Select at least one image to build and push."
            exit 1
          fi

  build:
    name: Build ${{ matrix.image.name }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            input: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/sidpalas/deputies-web
            platforms: linux/amd64,linux/arm64
            provenance: true
          - name: control-plane
            input: control_plane
            dockerfile: apps/control-plane/Dockerfile
            image: ghcr.io/sidpalas/deputies-control-plane
            platforms: linux/amd64,linux/arm64
            provenance: true
          - name: daytona
            input: daytona
            dockerfile: deploy/daytona/Dockerfile
            image: ghcr.io/sidpalas/deputies-daytona
            platforms: linux/amd64
            provenance: false

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ inputs[matrix.image.input] }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image.image || format('{0}/{1}-{2}', env.REGISTRY, github.repository, matrix.image.name) }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        if: ${{ inputs[matrix.image.input] }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          provenance: ${{ matrix.image.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
