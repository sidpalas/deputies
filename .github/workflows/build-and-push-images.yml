name: Build and Push Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  SANDBOX_BASE_IMAGE: ghcr.io/sidpalas/deputies-sandbox-base
  SANDBOX_BASE_REF: ghcr.io/sidpalas/deputies-sandbox-base:sha-${{ github.sha }}

jobs:
  build-sandbox-base:
    name: Build sandbox base
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract sandbox base metadata
        id: sandbox-base-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.SANDBOX_BASE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish sandbox base image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: deploy/sandboxes/base/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.sandbox-base-meta.outputs.tags }}
          labels: ${{ steps.sandbox-base-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=sandbox-base
            type=registry,ref=${{ env.SANDBOX_BASE_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=sandbox-base
            type=registry,ref=${{ env.SANDBOX_BASE_IMAGE }}:buildcache,mode=max

  build-app:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/sidpalas/deputies-web
            platforms: linux/amd64,linux/arm64
            provenance: true
          - name: control-plane
            dockerfile: apps/control-plane/Dockerfile
            image: ghcr.io/sidpalas/deputies-control-plane
            platforms: linux/amd64,linux/arm64
            provenance: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # TODO: Switch to Namespace or Depot builders for faster multi-arch builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          provenance: ${{ matrix.image.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.image.name }}
            type=registry,ref=${{ matrix.image.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.image.name }}
            type=registry,ref=${{ matrix.image.image }}:buildcache,mode=max

  build-sandbox:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: build-sandbox-base
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: daytona-sandbox
            dockerfile: deploy/sandboxes/daytona/Dockerfile
            image: ghcr.io/sidpalas/deputies-daytona-sandbox
            platforms: linux/amd64
            provenance: false
          - name: docker-sandbox
            dockerfile: deploy/sandboxes/docker/Dockerfile
            image: ghcr.io/sidpalas/deputies-docker-sandbox
            platforms: linux/amd64
            provenance: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # TODO: Switch to Namespace or Depot builders for faster multi-arch builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          provenance: ${{ matrix.image.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.image.name }}
            type=registry,ref=${{ matrix.image.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.image.name }}
            type=registry,ref=${{ matrix.image.image }}:buildcache,mode=max
          build-args: |
            DEPUTIES_SANDBOX_BASE_IMAGE=${{ env.SANDBOX_BASE_REF }}
