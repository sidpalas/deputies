name: Setup CI
description: Install the repository toolchain and workspace dependencies.

runs:
  using: composite
  steps:
    - name: Set up mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        version: 2026.6.13
        experimental: true

    - name: Locate pnpm store
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Hash pnpm lockfile
      id: pnpm-lock
      shell: bash
      run: |
        hash="$(shasum -a 256 pnpm-lock.yaml)"
        echo "hash=${hash%% *}" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-${{ runner.os }}-${{ steps.pnpm-lock.outputs.hash }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
