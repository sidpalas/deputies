<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Deputies is a control plane for delegating engineering work to background agents." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="Deputies" />
    <meta property="og:description" content="Deputies is a control plane for delegating engineering work to background agents." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Deputies" />
    <meta name="twitter:description" content="Deputies is a control plane for delegating engineering work to background agents." />
    <meta name="twitter:image" content="/og-image.png" />
    <script>
      (() => {
        const theme = localStorage.getItem('deputies-theme') || 'system';
        const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false;
        document.documentElement.classList.toggle('dark', theme === 'dark' || (theme === 'system' && prefersDark));
      })();
    </script>
    <title>Deputies</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
