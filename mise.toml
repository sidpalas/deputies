monorepo_root = true

[monorepo]
config_roots = [
  "apps/control-plane",
  "apps/web",
  "apps/www",
  "deploy/docker-compose",
  "deploy/aws",
  "deploy/kubernetes",
  "deploy/local",
  "deploy/railway",
  "deploy/sandboxes/daytona",
  "deploy/sandboxes/lambda-microvm",
  "deploy/sandboxes/tensorlake",
  "deploy/sandboxes/superserve",
  "packages/sandbox-bridge",
]

[tools]
fzf = "0.66"
node = "24"
"npm:pnpm" = "11.5.2"

[tasks.install]
description = "Install project dependencies"
run = "pnpm install"

[tasks.format]
description = "Format the workspace"
run = "pnpm format"

[tasks."format:check"]
description = "Check workspace formatting"
run = "pnpm format:check"

[tasks.lint]
description = "Lint the workspace"
run = "pnpm lint"

[tasks.test]
description = "Run package unit tests"
run = "pnpm -r --if-present test"

[tasks.typecheck]
description = "Run package TypeScript checks"
run = "pnpm -r --if-present typecheck"

[tasks."infra:validate"]
description = "Validate infrastructure definitions"
run = "mise run //deploy/aws:validate:ci && mise run //deploy/sandboxes/lambda-microvm:test"

[tasks."images:app:build:local"]
description = "Build control-plane and web images for the local Docker architecture"
run = """
set -euo pipefail
docker buildx inspect >/dev/null 2>&1 || docker buildx create --use >/dev/null
docker buildx build -f apps/control-plane/Dockerfile -t "${CONTROL_PLANE_IMAGE:-deputies-control-plane:local}" --load .
docker buildx build -f apps/web/Dockerfile -t "${WEB_IMAGE:-deputies-web:local}" --load .
"""

[tasks."images:app:push:multiarch"]
description = "Build and push multi-arch control-plane and web image manifests"
run = """
set -euo pipefail
: "${CONTROL_PLANE_IMAGE:?Set CONTROL_PLANE_IMAGE, for example ghcr.io/sidpalas/deputies-control-plane:sha-...}"
: "${WEB_IMAGE:?Set WEB_IMAGE, for example ghcr.io/sidpalas/deputies-web:sha-...}"
platforms="${DEPUTIES_APP_IMAGE_PLATFORMS:-linux/amd64,linux/arm64}"
docker buildx inspect >/dev/null 2>&1 || docker buildx create --use >/dev/null
docker buildx build --platform "$platforms" -f apps/control-plane/Dockerfile -t "$CONTROL_PLANE_IMAGE" --push .
docker buildx build --platform "$platforms" -f apps/web/Dockerfile -t "$WEB_IMAGE" --push .
"""

[tasks.check]
description = "Run formatting, linting, typechecks, and unit tests"
depends = ["format:check", "lint", "typecheck", "test", "infra:validate"]

[tasks."ci:smoke:local"]
description = "Run smoke GitHub Actions workflow locally with Agent CI"
run = "AI_AGENT=1 pnpm dlx @redwoodjs/agent-ci run --workflow .github/workflows/smoke-tests.yml --pause-on-failure --jobs 1"

[tasks.mise-fzf]
description = "[Mise] Pick one task; print it and copy the run command"
run = '''
#!/usr/bin/env bash
set -euo pipefail

LIST_CMD=(mise task ls --all)

SEL="$("${LIST_CMD[@]}" \
  | fzf --no-multi --height=90% --border --prompt='task> ' \
        --select-1 --exit-0)"

[ -n "${SEL:-}" ] || exit 0

# First token only = task name
TASK="$(awk '{print $1; exit}' <<< "$SEL")"

# Build the runnable command
CMD=$(printf 'mise run %q' "$TASK")

echo "$CMD"

# Print the task's usage/help
echo ""
mise run "$TASK" --help 2>/dev/null || true

copy_to_clipboard() {
  if command -v pbcopy >/dev/null 2>&1; then
    pbcopy
  # TODO: add support for linux clipboard tools
  else
    return 1
  fi
}

if copy_to_clipboard <<< "$CMD"; then
  echo "(^ copied to clipboard)"
fi
'''
