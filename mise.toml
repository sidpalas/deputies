experimental_monorepo_root = true

[tools]
fzf = "0.66"
"github:kubernetes-sigs/cloud-provider-kind" = "0.9"
kind = "0.30"
node = "24"
pnpm = "10.33"

[tasks.install]
description = "Install project dependencies"
run = "pnpm install"

[tasks.test]
description = "Run unit tests"
run = "pnpm test"

[tasks.typecheck]
description = "Run TypeScript type checking"
run = "pnpm typecheck"

[tasks.check]
description = "Run typecheck and tests"
depends = ["typecheck", "test"]

[tasks.mise-fzf]
description = "[Mise] Pick one task; print it and copy the run command"
run = '''
#!/usr/bin/env bash
set -euo pipefail

LIST_CMD=(mise task ls --all)

SEL="$("${LIST_CMD[@]}" \
  | fzf --no-multi --height=90% --border --prompt='task> ' \
        --select-1 --exit-0)"

[ -n "${SEL:-}" ] || exit 0

# First token only = task name
TASK="$(awk '{print $1; exit}' <<< "$SEL")"

# Build the runnable command
CMD=$(printf 'mise run %q' "$TASK")

echo "$CMD"

# Print the task's usage/help
echo ""
mise run "$TASK" --help 2>/dev/null || true

copy_to_clipboard() {
  if command -v pbcopy >/dev/null 2>&1; then
    pbcopy
  # TODO: add support for linux clipboard tools
  else
    return 1
  fi
}

if copy_to_clipboard <<< "$CMD"; then
  echo "(^ copied to clipboard)"
fi
'''

[tasks.portless-start]
description = "Start the local HTTPS wildcard portless proxy"
run = "pnpm portless:start"

[tasks.portless-alias-web]
description = "Route the local Deputies hostname to the Vite web dev server"
run = "pnpm portless:alias:web"

[tasks.deploy-control-plane]
description = "Deploy the control-plane service to Railway"
run = "railway up --service control-plane --detach -m 'deploy control-plane'"

[tasks.deploy-web]
description = "Deploy the web service to Railway"
run = "railway up --service web --detach -m 'deploy web'"

[tasks.deploy-www]
description = "Deploy the root-domain marketing site to Railway"
run = "railway up --service www --detach -m 'deploy www'"

[tasks.deploy]
description = "Deploy control-plane, web, and www services to Railway"
depends = ["deploy-control-plane", "deploy-web", "deploy-www"]

[tasks.daytona-image-build]
description = "Build the Daytona sandbox image"
# Daytona pulls amd64 images, and disabling provenance/SBOM avoids extra
# unknown/unknown GHCR attestation manifests that can confuse image resolution.
run = """
docker buildx build \
  --platform ${DAYTONA_IMAGE_PLATFORM:-linux/amd64} \
  --provenance=false \
  --sbom=false \
  -f deploy/sandboxes/base/Dockerfile \
  -t deputies-sandbox-base:local \
  --load \
  .

docker buildx build \
  --platform ${DAYTONA_IMAGE_PLATFORM:-linux/amd64} \
  --provenance=false \
  --sbom=false \
  -f deploy/sandboxes/daytona/Dockerfile \
  -t ${DAYTONA_IMAGE:-ghcr.io/sidpalas/deputies-daytona-sandbox:ubuntu24-node24-pg16-playwright1.59.1} \
  --load \
  .
"""

[tasks.daytona-image-push]
description = "Build and push the Daytona sandbox image"
run = """
docker buildx build \
  --platform ${DAYTONA_IMAGE_PLATFORM:-linux/amd64} \
  --provenance=false \
  --sbom=false \
  -f deploy/sandboxes/base/Dockerfile \
  -t deputies-sandbox-base:local \
  --load \
  .

docker buildx build \
  --platform ${DAYTONA_IMAGE_PLATFORM:-linux/amd64} \
  --provenance=false \
  --sbom=false \
  -f deploy/sandboxes/daytona/Dockerfile \
  -t ${DAYTONA_IMAGE:-ghcr.io/sidpalas/deputies-daytona-sandbox:ubuntu24-node24-pg16-playwright1.59.1} \
  --push \
  .
"""

[tasks.daytona-image-publish]
description = "Build and push the Daytona sandbox image"
depends = ["daytona-image-push"]
